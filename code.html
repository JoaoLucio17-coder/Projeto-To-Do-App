<style>
        .glass-panel {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .jelly-button {
            background: linear-gradient(180deg, #7cdd4c 0%, #47a513 100%);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(71, 165, 19, 0.4), inset 0 2px 4px rgba(255, 255, 255, 0.3);
        }
        .jelly-button::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 10%;
            width: 80%;
            height: 40%;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            filter: blur(2px);
        }
        .liquid-progress {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        .liquid-fill {
            background: linear-gradient(90deg, #7cdd4c, #97fb66);
            height: 100%;
            position: relative;
        }
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
        }
        .glass-pillar {
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid rgba(255,255,255,0.2);
            border-bottom: none;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .glass-pillar-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(180deg, #8bceff 0%, #00b2ff 100%);
            box-shadow: 0 -4px 12px rgba(139, 206, 255, 0.4);
        }
        .aurora-bg {
            background: radial-gradient(circle at 20% 30%, #004b6f 0%, #0f1418 50%),
                        radial-gradient(circle at 80% 70%, #1c5200 0%, #0f1418 50%);
            background-blend-mode: screen;
        }
        .water-droplet-check {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7cdd4c 0%, #47a513 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(71, 165, 19, 0.6), inset 1px 1px 2px rgba(255,255,255,0.5);
        }

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
