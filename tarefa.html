            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .jelly-button {
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, #47a513 0%, #1c5200 100%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 15px rgba(71, 165, 19, 0.4), inset 0 2px 4px rgba(255, 255, 255, 0.3);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .jelly-button::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 5%;
            width: 90%;
            height: 40%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0) 100%);
            border-radius: 50% / 100% 100% 0 0;
            pointer-events: none;
        }

        .jelly-button:active {
            transform: scale(0.95);
        }

        .water-droplet-check {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.2), rgba(0, 0, 0, 0.1));
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.2), 1px 1px 2px rgba(255, 255, 255, 0.1);
        }

        .glossy-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }

        .glossy-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #8bceff;
            box-shadow: 0 0 15px rgba(139, 206, 255, 0.3);
            outline: none;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .bg-nature-overlay {
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(139, 206, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(124, 221, 76, 0.1) 0%, transparent 40%);
        }
        
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(2px);
            pointer-events: none;
        }
    </style>
